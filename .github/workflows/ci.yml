name: CI

on:
    push:
        branches: ['*']
    pull_request:
        branches: ['*']

jobs:
    build-and-test:
        name: Build, Lint, Type-Check & Test
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [24.x]
        steps:
            # Checkout code
            - name: Checkout repository
              uses: actions/checkout@v4

            # Setup Node.js and cache dependencies
            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            # Install dependencies (clean install for CI)
            - name: Install dependencies
              run: npm ci

            # Lint only src/ for TypeScript, markdown anywhere
            - name: Lint code
              run: npm run lint

            # Check code formatting
            - name: Check formatting
              run: npm run format:check

            # TypeScript strict type-check (no emit)
            - name: TypeScript type-check
              run: npx tsc --noEmit

            # Run tests with coverage
            - name: Run tests
              run: npm test
              env:
                  CI: true
