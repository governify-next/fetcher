# Expert-level Docker build & push workflow for Node.js 24, multi-arch, DockerHub & GHCR
# Only runs on main, develop, or tags, and only after CI passes

name: Build and Publish Docker Image

on:
    push:
        branches:
            - main
            - develop
        tags:
            - '*.*.*'

# Set your DockerHub and GHCR image names here
env:
    REGISTRY_IMAGE: governify/base
    GHCR_IMAGE: ghcr.io/governify-next/base
    TAG: ${{ github.ref_name }}

jobs:
    build-and-push:
        name: Build & Push Docker Images
        runs-on: ubuntu-latest
        # Only run if CI (build-and-test) succeeded
        needs: [build-and-test]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up QEMU (multi-arch)
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push DockerHub Image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  tags: |
                      ${{ env.REGISTRY_IMAGE }}:${{ env.TAG }}
                      ${{ github.ref == 'refs/heads/main' && format('{0}:latest', env.REGISTRY_IMAGE) || '' }}
                      ${{ github.ref == 'refs/heads/develop' && format('{0}:develop', env.REGISTRY_IMAGE) || '' }}

            - name: Build and Push GHCR Image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  tags: |
                      ${{ env.GHCR_IMAGE }}:${{ env.TAG }}
                      ${{ github.ref == 'refs/heads/main' && format('{0}:latest', env.GHCR_IMAGE) || '' }}
                      ${{ github.ref == 'refs/heads/develop' && format('{0}:develop', env.GHCR_IMAGE) || '' }}
